apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-ingress
  namespace: vllm
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: vllm.local
    http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: vllm-local-router-service
            port:
              number: 80
